<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | DARKNESS DASHBOARD</title>
    <style>
        :root { --neon: #00ff88; --dark: #050a10; --accent: #112233; }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: #000 url('https://w0.peakpx.com/wallpaper/473/954/HD-wallpaper-meteor-shower-starry-night-galaxy-stars-falling-stars-meteor-night-sky.jpg') no-repeat center/cover fixed;
            color: #fff; overflow: hidden;
        }
        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: -1; }

        /* Sidebar Nav */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 240px;
            background: rgba(10, 20, 30, 0.95); border-right: 1px solid var(--neon);
            padding: 20px; box-sizing: border-box; backdrop-filter: blur(15px);
        }
        .logo { font-weight: bold; font-size: 24px; color: var(--neon); letter-spacing: 4px; margin-bottom: 40px; text-shadow: 0 0 10px var(--neon); }
        .nav-item { padding: 15px; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; color: #888; border: 1px solid transparent; }
        .nav-item:hover, .nav-active { background: rgba(0, 255, 136, 0.1); color: var(--neon); border-color: var(--neon); }

        /* Container Utama */
        .main { margin-left: 240px; padding: 40px; height: 100vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .card {
            background: rgba(17, 34, 51, 0.7); border: 1px solid rgba(0, 255, 136, 0.4);
            border-radius: 15px; padding: 25px; backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }
        h3 { color: var(--neon); margin-top: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #334455; padding-bottom: 10px; }

        /* Form Style */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: var(--neon); margin-bottom: 8px; font-weight: bold; }
        input, select, textarea {
            width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #334455;
            padding: 12px; color: #fff; border-radius: 8px; outline: none; box-sizing: border-box; font-family: 'Courier New', monospace;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }

        .sender-flex { display: flex; gap: 10px; }
        .btn-action { background: var(--neon); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon); }

        .btn-execute {
            width: 100%; padding: 18px; background: linear-gradient(90deg, #00ff88, #0088ff);
            border: none; border-radius: 10px; color: #000; font-weight: 900; font-size: 18px;
            cursor: pointer; margin-top: 25px; letter-spacing: 2px; transition: 0.4s;
        }
        .btn-execute:hover { letter-spacing: 5px; box-shadow: 0 0 30px rgba(0, 255, 136, 0.6); }

        textarea { height: 150px; font-size: 11px; color: #ff0055; border-color: #441122; }

        /* Status Badge */
        .status-pill { display: inline-block; padding: 4px 10px; background: rgba(0, 255, 136, 0.2); color: var(--neon); border-radius: 20px; font-size: 10px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="sidebar">
        <div class="logo">VORTEX V3</div>
        <div class="status-pill">● SERVER: CONNECTED</div>
        <div style="margin-top: 30px;">
            <div class="nav-item nav-active">DASHBOARD</div>
            <div class="nav-item">WHATSAPP PAIRING</div>
            <div class="nav-item">BUG REPOSITORY</div>
            <div class="nav-item">TARGET LOGS</div>
            <div class="nav-item" style="color: #ff4444; margin-top: 100px;">LOGOUT SYSTEM</div>
        </div>
    </div>

    <div class="main">
        <div class="card">
            <h3>Target Configuration</h3>
            
            <div class="input-group">
                <label>ADD SENDER (WHATSAPP NUMBER)</label>
                <div class="sender-flex">
                    <input type="text" id="sender" placeholder="+628xxx">
                    <button class="btn-action" onclick="pairing()">PAIR</button>
                </div>
                <small style="color: #555; font-size: 9px;">*Gunakan pairing code untuk menghubungkan sender.</small>
            </div>

            <div class="input-group">
                <label>TARGET PHONE NUMBER</label>
                <input type="text" placeholder="Masukkan Nomor Korban...">
            </div>

            <div class="input-group">
                <label>TRANSMISSION MODE</label>
                <select>
                    <option>WhatsApp Web Pairing</option>
                    <option>Socket.io Injection</option>
                    <option>Manual Gateway</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h3>Payload & Bug Selection</h3>
            
            <div class="input-group">
                <label>BUG TYPE</label>
                <select id="bug" onchange="genPayload()">
                    <option value="">-- Pilih Bug --</option>
                    <option value="C1">Crash System (Ultra)</option>
                    <option value="L1">Lag Loop (Infinite)</option>
                    <option value="U1">UI Bug (Screen Freeze)</option>
                </select>
            </div>

            <div class="input-group">
                <label>PAYLOAD PREVIEW (VIRUS TEXT)</label>
                <textarea id="preview" readonly placeholder="Payload akan ter-generate otomatis..."></textarea>
            </div>

            <button class="btn-execute" onclick="execute()">TRANSMIT NOW</button>
        </div>
    </div>

    <script>
        function genPayload() {
            const b = document.getElementById('bug').value;
            const p = document.getElementById('preview');
            if(b === "C1") p.value = "VORTEX_CRASH_".repeat(800) + "FATAL_ERROR";
            else if(b === "L1") p.value = "🌀".repeat(1500) + "LOOP_LAG_ACTIVE";
            else if(b === "U1") p.value = "▓▒░".repeat(1200) + "UI_FREEZE";
            else p.value = "";
        }

        function pairing() {
            const n = document.getElementById('sender').value;
            if(!n) return alert("Masukkan nomor pengirim!");
            alert("Pairing Code: VRTX-99\nMasukkan kode ini di WhatsApp perangkat pengirim.");
        }

        function execute() {
            alert("Memulai Transmisi... Payload sedang dikirim melalui jalur Pairing WhatsApp.");
        }
    </script>
</body>
</html>
