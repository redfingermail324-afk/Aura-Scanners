<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EYE v15.0 - MASTER MIND CONTROL</title>
    <style>
        :root { --green: #1b5e20; --gold: #ffd700; --pink: #ff4081; --red: #d32f2f; }
        body { background: #f0f2f5; font-family: sans-serif; margin: 0; }
        .header { background: linear-gradient(to right, var(--green), #388e3c); color: white; padding: 15px; text-align: center; font-weight: bold; border-bottom: 4px solid var(--gold); }
        .card { background: white; margin: 15px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 6px solid var(--green); }
        button { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-ban { background: var(--red); font-size: 10px; padding: 5px; }
        .btn-main { background: var(--green); width: 100%; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        #ban-screen { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; color:red; flex-direction:column; justify-content:center; align-items:center; z-index:9999; text-align:center; font-family: 'Courier New', monospace; }
    </style>
</head>
<body onload="bootSystem()">

<div id="ban-screen">
    <h1>⚠️ IP BLOCKED ⚠️</h1>
    <p>ANDA TELAH DIBLOKIR OLEH SISTEM MASTER MIND CONTROL.</p>
    <p>HUBUNGI LEAD DEV <b>KALZ</b> UNTUK AKTIVASI ULANG.</p>
</div>

<div class="header">🌙 THE EYE v15.0 - MASTER MIND CONTROL</div>

<div id="auth" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div style="background:white; padding:30px; border-radius:20px; width:280px; text-align:center;">
        <h2 style="color:var(--green)">COMMAND CENTER</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-main" onclick="doLogin()">AKSES SISTEM</button>
    </div>
</div>

<div id="main-ui" style="display:none;">
    <div style="padding:15px; display:flex; justify-content:space-between;">
        <b>DEV: <span id="my-name"></span></b>
        <button onclick="doLogout()" style="background:#444; padding:5px 10px;">EXIT</button>
    </div>

    <div id="dev-zone" class="card" style="display:none; border-left-color: var(--red);">
        <h3 style="color:var(--red); margin:0;">🧠 MASTER MIND CONTROL</h3>
        <p style="font-size:11px;">Kelola IP & Akun Member di sini.</p>
        <div id="user-list-table"></div>
        <hr>
        <input type="text" id="nu" placeholder="User Baru">
        <input type="text" id="np" placeholder="Pass Baru">
        <button class="btn-main" onclick="addUser()">TAMBAH MEMBER</button>
    </div>

    <div class="card">
        <h3>🛰️ RADAR INTELIJEN</h3>
        <div id="logs-view" style="font-size:12px; max-height:200px; overflow-y:auto;">Menunggu...</div>
    </div>
</div>

<script>
    let myIP = "";

    async function bootSystem() {
        // Deteksi IP User
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            myIP = data.ip;
        } catch(e) { myIP = "127.0.0.1"; }

        // Cek Blacklist
        const blacklist = JSON.parse(localStorage.getItem("ip_blacklist")) || [];
        if(blacklist.includes(myIP)) {
            document.body.innerHTML = document.getElementById('ban-screen').innerHTML;
            document.body.style.background = "black";
            document.body.style.color = "red";
            return;
        }

        if(!localStorage.getItem("db")) {
            localStorage.setItem("db", JSON.stringify([{u:"kalz", p:"111", role:"OWNER", ip:myIP}]));
        }
        
        const sess = sessionStorage.getItem("user");
        if(sess) renderDash(JSON.parse(sess));
    }

    function doLogin() {
        const db = JSON.parse(localStorage.getItem("db"));
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const found = db.find(x => x.u === u && x.p === p);
        
        if(found) {
            found.ip = myIP; // Update IP saat login
            localStorage.setItem("db", JSON.stringify(db));
            sessionStorage.setItem("user", JSON.stringify(found));
            renderDash(found);
        } else { alert("Akses Ditolak!"); }
    }

    function renderDash(u) {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('my-name').innerText = u.u;
        
        if(u.role === "OWNER") {
            document.getElementById('dev-zone').style.display = 'block';
            refreshUsers();
        }
        loadLogs();
    }

    function refreshUsers() {
        const db = JSON.parse(localStorage.getItem("db"));
        let html = `<table style="width:100%; font-size:11px;"><tr><th>USER</th><th>IP</th><th>AKSI</th></tr>`;
        db.forEach((usr, i) => {
            html += `<tr>
                <td>${usr.u}</td>
                <td>${usr.ip || 'Offline'}</td>
                <td>${usr.role === 'OWNER' ? '⭐' : `<button class="btn-ban" onclick="banIP('${usr.ip}')">BAN IP</button>`}</td>
            </tr>`;
        });
        document.getElementById('user-list-table').innerHTML = html + `</table>`;
    }

    function banIP(ip) {
        if(!ip || ip === "Offline") return alert("IP tidak terdeteksi!");
        let blacklist = JSON.parse(localStorage.getItem("ip_blacklist")) || [];
        if(!blacklist.includes(ip)) {
            blacklist.push(ip);
            localStorage.setItem("ip_blacklist", JSON.stringify(blacklist));
            alert("IP " + ip + " BERHASIL DI-BAN!");
            location.reload();
        }
    }

    function addUser() {
        let db = JSON.parse(localStorage.getItem("db"));
        db.push({u:document.getElementById('nu').value, p:document.getElementById('np').value, role:"MEMBER", ip:""});
        localStorage.setItem("db", JSON.stringify(db));
        refreshUsers();
    }

    function loadLogs() {
        setInterval(() => {
            const logs = JSON.parse(localStorage.getItem("eye_logs")) || [];
            document.getElementById('logs-view').innerHTML = logs.map(l => `<div style="padding:5px; border-bottom:1px solid #eee;">${l}</div>`).join('') || "Kosong.";
        }, 2000);
    }

    function doLogout() { sessionStorage.clear(); location.reload(); }
</script>
</body>
</html>
