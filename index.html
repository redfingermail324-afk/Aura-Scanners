<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | DARKNESS DASHBOARD</title>
    <style>
        :root { --neon: #00ff88; --dark: #070b10; --accent: #112233; }
        
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: #000 url('https://w0.peakpx.com/wallpaper/473/954/HD-wallpaper-meteor-shower-starry-night-galaxy-stars-falling-stars-meteor-night-sky.jpg') no-repeat center/cover fixed;
            color: #fff; overflow-x: hidden;
        }

        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: -1; }

        /* Sidebar Sederhana */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
            background: rgba(10, 20, 30, 0.9); border-right: 1px solid var(--neon);
            padding: 20px; box-sizing: border-box; backdrop-filter: blur(10px);
        }

        .logo { font-weight: bold; font-size: 22px; color: var(--neon); letter-spacing: 3px; margin-bottom: 40px; }
        .nav-item { padding: 12px; margin-bottom: 10px; cursor: pointer; border-radius: 5px; transition: 0.3s; color: #888; }
        .nav-item:hover, .nav-active { background: rgba(0, 255, 136, 0.1); color: var(--neon); }

        /* Main Area */
        .main { margin-left: 220px; padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .card {
            background: rgba(17, 34, 51, 0.6); border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px; padding: 25px; backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h3 { color: var(--neon); margin-top: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        input, select, textarea {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #334455;
            padding: 12px; color: #fff; border-radius: 6px; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--neon); }

        /* Fitur Sender */
        .sender-box { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; }
        .btn-add { background: var(--neon); color: #000; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .btn-execute {
            width: 100%; padding: 15px; background: linear-gradient(45deg, #00ff88, #0088ff);
            border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 16px;
            cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .btn-execute:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4); }

        /* Teks Panjang (Virtex Simulation Display) */
        textarea { height: 100px; font-family: monospace; font-size: 12px; resize: none; color: #ff0055; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="sidebar">
        <div class="logo">VORTEX</div>
        <div class="nav-item nav-active">Dashboard</div>
        <div class="nav-item">Pairing Device</div>
        <div class="nav-item">Database Bug</div>
        <div class="nav-item">Reseller Panel</div>
        <div class="nav-item" style="margin-top: 50px; color: #ff4444;">Logout</div>
    </div>

    <div class="main">
        <div class="card">
            <h3>Target & Sender Configuration</h3>
            
            <div class="input-group">
                <label>WHATSAPP SENDER (ADD DEVICE)</label>
                <div class="sender-box">
                    <input type="text" id="senderNum" placeholder="+628xxx">
                    <button class="btn-add" onclick="alert('Pairing Code Sent to ' + document.getElementById('senderNum').value)">ADD</button>
                </div>
            </div>

            <div class="input-group">
                <label>TARGET NUMBER</label>
                <input type="text" placeholder="Masukkan Nomor Target (+62)">
            </div>

            <div class="input-group">
                <label>CONNECTION METHOD</label>
                <select>
                    <option>WhatsApp Pairing Code</option>
                    <option>Direct Injection (Beta)</option>
                    <option>Websocket Tunnel</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h3>Payload Selection (Text System)</h3>
            
            <div class="input-group">
                <label>BUG OPTION</label>
                <select id="bugType" onchange="updateText()">
                    <option value="none">-- Pilih Tipe --</option>
                    <option value="crash">Crash System v1</option>
                    <option value="ui">UI Overload</option>
                    <option value="lag">Infinite Loop Lag</option>
                </select>
            </div>

            <div class="input-group">
                <label>PAYLOAD PREVIEW (LONG TEXT)</label>
                <textarea id="payloadText" readonly placeholder="Payload akan muncul di sini..."></textarea>
            </div>

            <button class="btn-execute" onclick="execute()">EXECUTE TRANSMISSION</button>
        </div>
    </div>

    <script>
        // Simulasi teks panjang yang sangat banyak
        function updateText() {
            const bug = document.getElementById('bugType').value;
            const area = document.getElementById('payloadText');
            
            if(bug === "crash") {
                area.value = "VORTEX-BUG-CRASH".repeat(500) + "DEAD_SYSTEM_ERROR_000";
            } else if(bug === "ui") {
                area.value = "░▒▓█".repeat(1000) + "OVERLOAD_UI_VERSION_X";
            } else {
                area.value = "";
            }
        }

        function execute() {
            alert("Sistem Sedang Pairing... Mengirimkan Transmisi Data Ke Target.");
        }
    </script>
</body>
</html>
