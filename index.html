<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | DARKNESS ULTIMATE</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        :root { --neon: #00ff88; --owner: #ff0055; --bg: #050a10; }
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #000 url('https://w0.peakpx.com/wallpaper/473/954/HD-wallpaper-meteor-shower-starry-night-galaxy-stars-falling-stars-meteor-night-sky.jpg') no-repeat center/cover fixed;
            color: #fff; height: 100vh; display: flex; overflow: hidden;
        }
        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: -1; }

        /* Sidebar Navigasi */
        .sidebar {
            width: 250px; background: rgba(10, 20, 30, 0.95);
            border-right: 1px solid var(--neon); padding: 25px; box-sizing: border-box;
            backdrop-filter: blur(15px); z-index: 10;
        }
        .logo { font-weight: 900; font-size: 26px; color: var(--neon); letter-spacing: 5px; margin-bottom: 50px; text-shadow: 0 0 15px var(--neon); }
        .nav-item { 
            padding: 15px; margin-bottom: 15px; cursor: pointer; border-radius: 10px; 
            transition: 0.3s; color: #666; font-weight: bold; border: 1px solid transparent;
        }
        .nav-item:hover, .active-tab { background: rgba(0, 255, 136, 0.1); color: var(--neon); border-color: var(--neon); }
        .owner-menu { border-color: var(--owner) !important; color: var(--owner) !important; margin-top: 30px; }

        /* Area Konten */
        .content { flex: 1; padding: 40px; overflow-y: auto; z-index: 5; }
        .tab-content { display: none; animation: fadeIn 0.5s; }
        .active-view { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .active-view-full { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: rgba(17, 34, 51, 0.7); border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 15px; padding: 25px; backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Form Style */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--neon); margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        input, select, textarea {
            width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #334455;
            padding: 14px; color: #fff; border-radius: 8px; outline: none; box-sizing: border-box; font-family: monospace;
        }
        input:focus { border-color: var(--neon); }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-main { background: var(--neon); color: #000; }
        .btn-owner { background: var(--owner); color: #fff; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #223344; font-size: 13px; }
        th { color: var(--neon); }

        textarea { height: 120px; color: #ff0055; font-size: 10px; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="sidebar">
        <div class="logo">VORTEX</div>
        <div class="nav-item active-tab" onclick="openTab(event, 'dashboard')">DASHBOARD</div>
        <div class="nav-item" onclick="openTab(event, 'pairing')">WA PAIRING</div>
        <div class="nav-item owner-menu" onclick="openTab(event, 'owner')">MASTER PANEL</div>
        <div class="nav-item" style="color: #ff4444; margin-top: 100px;">EXIT</div>
    </div>

    <div class="content">
        
        <div id="dashboard" class="tab-content active-view">
            <div class="card">
                <h3>Target Configuration</h3>
                <div class="input-group">
                    <label>Target Number</label>
                    <input type="text" id="targetNum" placeholder="+628xxxx">
                </div>
                <div class="input-group">
                    <label>Sender Device</label>
                    <select id="senderSel">
                        <option>No Device Connected</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Loop Count</label>
                    <input type="number" value="1" min="1">
                </div>
            </div>

            <div class="card">
                <h3>Bug & Payload</h3>
                <div class="input-group">
                    <label>Payload Type</label>
                    <select id="bugType" onchange="genVirtex()">
                        <option value="">-- Pilih Bug --</option>
                        <option value="crash">WhatsApp Crash v1</option>
                        <option value="lag">Infinite Lag Text</option>
                        <option value="freeze">UI Freeze Payload</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Virtex Preview</label>
                    <textarea id="vPreview" readonly></textarea>
                </div>
                <button class="btn btn-main" onclick="sendAttack()">Execute Transmission</button>
            </div>
        </div>

        <div id="pairing" class="tab-content active-view-full">
            <div class="card" style="max-width: 500px; margin: auto;">
                <h3 style="text-align: center;">WhatsApp Device Pairing</h3>
                <div class="input-group">
                    <label>Nomor Pengirim</label>
                    <input type="text" id="pairNum" placeholder="+628xxx">
                </div>
                <button class="btn btn-main" onclick="alert('Pairing Code: VRTX-2026\nCek WhatsApp di HP pengirim.')">Dapatkan Kode Pairing</button>
                <p style="font-size: 11px; color: #888; margin-top: 15px;">*Fitur ini menghubungkan sender lo ke server Vortex via Pairing Code.</p>
            </div>
        </div>

        <div id="owner" class="tab-content active-view-full">
            <div class="card">
                <h3 style="color: var(--owner);">Master Control - Create User</h3>
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <input type="text" id="nu" placeholder="New Username">
                    <input type="text" id="np" placeholder="New Password">
                    <select id="nr" style="width: 200px;">
                        <option value="MEMBER">MEMBER</option>
                        <option value="RESELLER">RESELLER</option>
                        <option value="PARTNER">PARTNER</option>
                    </select>
                    <button class="btn btn-owner" style="width: 200px;" onclick="addAcc()">Create</button>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="userTable">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // Fungsi Tab
        function openTab(evt, tabName) {
            var i, tabcontent, navitems;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
                tabcontent[i].classList.remove("active-view", "active-view-full");
            }
            navitems = document.getElementsByClassName("nav-item");
            for (i = 0; i < navitems.length; i++) {
                navitems[i].className = navitems[i].className.replace(" active-tab", "");
            }
            const activeTab = document.getElementById(tabName);
            activeTab.style.display = (tabName === 'dashboard') ? "grid" : "block";
            if(tabName === 'dashboard') activeTab.classList.add("active-view");
            else activeTab.classList.add("active-view-full");
            
            evt.currentTarget.className += " active-tab";
        }

        // Buka dashboard secara default
        document.getElementById('dashboard').style.display = "grid";

        // Generate Virtex Preview
        function genVirtex() {
            const t = document.getElementById('bugType').value;
            const p = document.getElementById('vPreview');
            if(t === 'crash') p.value = "VRTX_CRASH_".repeat(500);
            else if(t === 'lag') p.value = "🌀🌀🌀".repeat(800);
            else if(t === 'freeze') p.value = "░▒▓█".repeat(1000);
            else p.value = "";
        }

        // Owner: Add Account
        let db = JSON.parse(localStorage.getItem('vortex_db') || "[]");
        function addAcc() {
            const u = document.getElementById('nu').value;
            const p = document.getElementById('np').value;
            const r = document.getElementById('nr').value;
            if(!u || !p) return;
            db.push({u, p, r});
            localStorage.setItem('vortex_db', JSON.stringify(db));
            renderTable();
            alert("Akun Created!");
        }

        function renderTable() {
            const t = document.getElementById('userTable');
            t.innerHTML = "";
            db.forEach((a, i) => {
                t.innerHTML += `<tr>
                    <td>${a.u}</td>
                    <td>${a.r}</td>
                    <td style="color: #0f0;">ONLINE</td>
                    <td><button onclick="db.splice(${i},1);renderTable();" style="background:red; color:white; border:none; cursor:pointer;">KICK</button></td>
                </tr>`;
            });
        }
        renderTable();

        function sendAttack() {
            alert("TRANSMISSION STARTED: Mengirim Payload ke target melalui jalur pairing...");
        }
    </script>
</body>
</html>
