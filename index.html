<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID-OS | SECURE DASHBOARD</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --neon: #ff00ea; --cyber: #00f2ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* LOGIN PAGE */
        #login-page { text-align: center; margin-top: 100px; }
        input, select { background: #111; border: 1px solid #333; color: #fff; padding: 12px; margin: 5px; border-radius: 8px; width: 250px; outline: none; }
        button { background: var(--neon); color: #fff; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px var(--neon); }

        /* MAIN DASHBOARD */
        #main-dashboard { display: none; width: 100%; max-width: 500px; }
        .card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        h2 { color: var(--cyber); font-size: 18px; margin-top: 0; }
        .status-bar { font-size: 12px; color: #555; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="login-page">
        <h1 style="color:var(--neon)">VOID-OS LOGIN</h1>
        <input type="text" id="user" placeholder="Username"><br>
        <input type="password" id="pass" placeholder="Password"><br><br>
        <button onclick="login()">AUTHORIZE</button>
    </div>

    <div id="main-dashboard">
        <div class="status-bar">
            LOGGED AS: <span id="display-role" style="color:var(--neon); font-weight:bold;">NONE</span>
        </div>

        <div class="card">
            <h2>CREATE NEW AGENT</h2>
            <input type="text" id="new-name" placeholder="Agent Name" style="width:90%"><br>
            <input type="text" id="new-pass" placeholder="Agent Password" style="width:90%"><br>
            <select id="new-role" style="width:96%">
                <option value="member">ROLE: MEMBER</option>
                <option value="owner">ROLE: OWNER</option>
            </select><br><br>
            <button onclick="createAccount()" style="width:100%; background:var(--cyber); color:#000;">CREATE ACCOUNT</button>
            <p id="msg" style="font-size:10px; color:red; margin-top:10px; text-align:center;"></p>
        </div>

        <button onclick="location.reload()" style="background:#333; width:100%;">LOGOUT SYSTEM</button>
    </div>

<script>
    // --- KONFIGURASI DATABASE ---
    const config = { 
        apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ", 
        databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    // VARIABEL GLOBAL UNTUK PENGECEKAN ROLE
    let myRole = ""; 
    let myName = "";

    // FUNGSI LOGIN DENGAN SISTEM IDENTIFIKASI ROLE
    function login() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;

        db.ref('users/' + user).once('value', (snap) => {
            if (snap.exists() && snap.val().password === pass) {
                // SIMPAN ROLE KE VARIABEL SISTEM
                myRole = snap.val().role.toLowerCase(); 
                myName = user;

                document.getElementById('display-role').innerText = myRole.toUpperCase();
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                
                alert("Access Granted as " + myRole);
            } else {
                alert("Wrong Username or Password!");
            }
        });
    }

    // FUNGSI CREATE ACCOUNT (PATCH KEAMANAN v20.2)
    function createAccount() {
        // 🛑 PROTEKSI UTAMA: CEK APAKAH DIA DEVELOPER
        if (myRole !== "developer") {
            document.getElementById('msg').innerText = "🚨 ACCESS DENIED: Only Developer can create accounts!";
            alert("Warning! Unauthorized attempt detected.");
            return; // Berhenti total, jangan kirim data ke Firebase
        }

        const name = document.getElementById('new-name').value;
        const pass = document.getElementById('new-pass').value;
        const role = document.getElementById('new-role').value;

        if (name && pass) {
            // KIRIM DATA KE FIREBASE (HANYA JALAN JIKA DEVELOPER)
            db.ref('users/' + name).set({
                password: pass,
                role: role,
                created_by: myName
            }).then(() => {
                alert("Account " + name + " Created Successfully!");
                document.getElementById('new-name').value = "";
                document.getElementById('new-pass').value = "";
                document.getElementById('msg').innerText = "";
            });
        } else {
            alert("Please fill all fields!");
        }
    }
</script>
</body>
</html>
